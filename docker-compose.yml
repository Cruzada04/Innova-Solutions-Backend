version: '3.8'

services:
  db:
    image: postgres:15
    container_name: innova-db
    restart: always
    environment:
      POSTGRES_DB: db_innovasolutions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgre
    ports:
      - "5433:5432" # Cambiado a 5433 para evitar conflicto con tu pgAdmin local
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
