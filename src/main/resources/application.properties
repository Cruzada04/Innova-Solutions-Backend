spring.application.name=Innova-Solutions-Backend

# Base de datos (Apuntando al puerto 5433 para desarrollo con Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/db_innovasolutions
spring.datasource.username=postgres
spring.datasource.password=postgre 

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ejecución de import.sql (Solo si las tablas están vacías o al crear)
spring.sql.init.mode=always

# Errores
server.error.include-stacktrace=never
